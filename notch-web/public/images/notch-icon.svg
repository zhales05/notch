<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Notch icon — square format -->
  <!-- Centered group: 5 strokes × 22px apart = 88px wide, center at 100 → start at 56 -->

  <!-- Stroke 1 — tall left leg -->
  <line x1="56"  y1="44"  x2="56"  y2="156" stroke="#111111" stroke-width="14" stroke-linecap="round"/>
  <!-- Stroke 2 -->
  <line x1="78"  y1="58"  x2="78"  y2="156" stroke="#111111" stroke-width="14" stroke-linecap="round"/>
  <!-- Stroke 3 — shortest, bottom of V -->
  <line x1="100" y1="86"  x2="100" y2="156" stroke="#111111" stroke-width="14" stroke-linecap="round"/>
  <!-- Stroke 4 -->
  <line x1="122" y1="58"  x2="122" y2="156" stroke="#111111" stroke-width="14" stroke-linecap="round"/>
  <!-- Stroke 5 — accent blue -->
  <line x1="144" y1="44"  x2="144" y2="156" stroke="#4F7EF7" stroke-width="14" stroke-linecap="round"/>
</svg>
