<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Notch logo — full lockup (icon + wordmark) -->

  <!-- Icon: five tally strokes, heights form an N silhouette -->
  <!-- Stroke 1 — tall left leg -->
  <line x1="40" y1="28" x2="40" y2="108" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
  <!-- Stroke 2 -->
  <line x1="62" y1="38" x2="62" y2="108" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
  <!-- Stroke 3 — shortest, bottom of V -->
  <line x1="84" y1="60" x2="84" y2="108" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
  <!-- Stroke 4 -->
  <line x1="106" y1="38" x2="106" y2="108" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
  <!-- Stroke 5 — accent blue, right leg -->
  <line x1="128" y1="28" x2="128" y2="108" stroke="#4F7EF7" stroke-width="10" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="160"
    y="84"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="52"
    font-weight="500"
    fill="#111111"
    letter-spacing="4"
    dominant-baseline="middle"
  >notch</text>

  <!-- Tagline -->
  <text
    x="162"
    y="118"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif"
    font-size="13"
    font-weight="400"
    fill="#888888"
    letter-spacing="2.5"
  >EARN IT EVERY DAY</text>
</svg>
